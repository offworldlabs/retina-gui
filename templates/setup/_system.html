<!-- Step 2: System Update -->
<div data-step="system" class="step-panel" style="display:none;">

    <div class="text-start mx-auto mb-3" style="max-width: 400px;">
        <div class="card mb-2">
            <div class="card-body d-flex align-items-center py-2 px-3">
                <div class="flex-grow-1">
                    <strong>OWL-OS</strong>
                    <span id="systemCurrentVersion" class="text-muted small ms-1"></span>
                    <span id="systemVersionArrow" style="display:none;"> &rarr; <strong id="systemLatestVersion"></strong></span>
                    <br><small class="text-muted">Operating system update</small>

        <button type="button" class="btn btn-outline-primary" id="systemNextBtn" style="display:none;">

        </button>
        <div id="systemInstallStatus" class="small mt-2"></div>
