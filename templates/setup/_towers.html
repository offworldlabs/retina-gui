<!-- Step 5: Tower Selection -->
<div data-step="towers" class="step-panel" style="display:none;">
    <div class="wiz-title-row">
        <h1>Choose a tower</h1>
        <p>Select a broadcast transmitter to use as the passive radar illuminator.</p>
    </div>

    <!-- Loading -->
    <div id="towerLoading" style="padding:24px 0;text-align:center;">
        <div class="spinner-border" style="width:1.5rem;height:1.5rem;border-width:2px;color:var(--accent);"></div>
        <p style="color:var(--ink-3);font-size:13px;margin-top:12px;">Querying broadcast licence database — this may take up to a minute…</p>
    </div>

    <!-- Error -->
    <div id="towerError" style="display:none;background:oklch(0.96 0.04 25);border:1px solid var(--danger);border-radius:var(--r-md);padding:12px 16px;font-size:13px;color:var(--danger);"></div>

    <!-- Results -->
    <div id="towerResults" style="display:none;">
        <div class="scan-summary" id="towerSummary"></div>

        <div id="towerMap" class="tower-map"></div>

        <div style="overflow-x:auto;margin-top:14px;">
            <table class="tower-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Callsign</th>
                        <th class="hide-mobile">Lat</th>
                        <th class="hide-mobile">Long</th>
                        <th>Freq</th>
                        <th>Band</th>
                        <th>Dist</th>
                        <th>Bearing</th>
                        <th class="hide-mobile">Rx Power</th>
                        <th>Suit.</th>
                    </tr>
                </thead>
                <tbody id="towerTableBody"></tbody>
            </table>
        </div>

        <div id="selectedTowerCard" class="selected-tower-card" style="display:none;">
            <div class="tower-name"  id="selectedTowerName"></div>
            <div class="tower-detail" id="selectedTowerDetail"></div>
        </div>
    </div>

</div>
