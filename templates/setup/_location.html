<!-- Step 4: Location (simple form) -->
<div data-step="location" class="step-panel" style="display:none;">
    <div class="text-start mx-auto" style="max-width: 360px;">
        <div class="row g-2 mb-2">
            <div class="col">
                <label class="form-label small mb-1">Latitude</label>
                <input type="number" class="form-control form-control-sm" id="rxLat" step="any" min="-90" max="90" placeholder="e.g. 38.8977">
            </div>
            <div class="col">
                <label class="form-label small mb-1">Longitude</label>
                <input type="number" class="form-control form-control-sm" id="rxLon" step="any" min="-180" max="180" placeholder="e.g. -77.0365">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label small mb-1">Altitude (m)</label>
            <input type="number" class="form-control form-control-sm" id="rxAlt" step="any" min="0" placeholder="Auto-detected from elevation">
        </div>

        <button type="button" class="btn btn-outline-secondary btn-sm w-100 mb-2" id="useMyLocationBtn">Use My Location</button>
        <p id="locationGeoError" class="text-danger small mb-2" style="display:none;"></p>

        <!-- Frequencies (collapsible) -->
        <div class="mb-3">
            <a href="#" class="text-muted small text-decoration-none" id="freqToggle">+ Add Measured Frequencies</a>
            <div id="freqSection" style="display:none;" class="mt-2">
                <label class="form-label small mb-1">Measured Frequencies (MHz)</label>
                <div id="freqInputs">
                    <div class="input-group input-group-sm mb-1">
                        <input type="number" class="form-control" step="any" min="0" placeholder="Freq 1 (MHz)">
                    </div>
                </div>
                <button type="button" class="btn btn-link btn-sm text-decoration-none p-0" id="addFreqBtn">+ Add Frequency</button>
            </div>
        </div>
    </div>

    <div class="text-center">
        <button type="button" class="btn btn-primary" id="findTowersBtn" disabled>Find Towers &rarr;</button>
        <br>
        <button type="button" class="btn btn-link btn-sm text-muted mt-1" id="locationSkipBtn">Skip &rarr;</button>
    </div>
</div>
