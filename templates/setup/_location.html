<!-- Step 4: Location -->
<div data-step="location" class="step-panel" style="display:none;">
    <div class="wiz-title-row">
        <h1>Where is your receiver?</h1>
        <p>Set the coordinates of the radar receiver site.</p>
    </div>
    <div class="step-stack">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div class="ds-field">
                <label class="ds-field-label" for="rxLat">Latitude</label>
                <input type="number" class="ds-input mono" id="rxLat" step="any" min="-90" max="90" placeholder="e.g. 38.8977">
            </div>
            <div class="ds-field">
                <label class="ds-field-label" for="rxLon">Longitude</label>
                <input type="number" class="ds-input mono" id="rxLon" step="any" min="-180" max="180" placeholder="e.g. -77.0365">
            </div>
        </div>

        <div class="ds-field">
            <label class="ds-field-label" for="rxAlt">Altitude (m)</label>
            <input type="number" class="ds-input mono" id="rxAlt" step="any" min="0" placeholder="Enter altitude manually">
        </div>

        <button type="button" class="ds-btn ghost" id="useMyLocationBtn" style="align-self:flex-start;">
            <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Use my location
        </button>
        <p id="locationGeoError" style="display:none;color:var(--danger);font-size:13px;margin:0;"></p>

        <div class="ds-field">
            <button type="button" class="ds-btn ghost sm" id="scanRfBtn" style="width:100%;">
                <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                Scan RF signals
            </button>
            <p id="scanStatus" style="display:none;font-size:13px;color:var(--ink-2);margin:4px 0 0;"></p>
            <p id="scanResult" style="display:none;font-size:13px;color:var(--ok);margin:4px 0 0;"></p>
        </div>
    </div>

</div>
