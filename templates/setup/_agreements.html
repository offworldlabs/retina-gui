<!-- Step 1: Agreements -->
<div data-step="agreements" class="step-panel">
    <div class="wiz-title-row">
        <h1>Let's get started</h1>
        <p>Before we begin, please review and accept the terms below.</p>
    </div>
    <div class="step-stack">
        <label class="step-check">
            <input type="checkbox" id="eulaCheck">
            <div>
                <div class="step-check-text">I accept the <a href="/eula" target="_blank" style="color:var(--accent);">End User Licence Agreement</a></div>
            </div>
        </label>

        <label class="step-check">
            <input type="checkbox" id="cloudCheck">
            <div>
                <div class="step-check-text">Enable cloud services</div>
                <div class="step-check-help">Required for automatic updates. Can be disabled later in Settings.</div>
            </div>
        </label>
    </div>

</div>
